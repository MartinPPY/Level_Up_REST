services:

  rest_service:
    build: .
    container_name: spring_boot_rest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - SHOW_SQL=${SHOW_SQL}
      - SQL_DDL_AUTO=${SQL_DDL_AUTO}
    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: mysql_database
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}

    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

    
    
